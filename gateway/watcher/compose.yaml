services:
  sir-watcher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sir-watcher
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - nginx-conf:/etc/nginx/conf.d
    environment:
      DOMAIN: ${DOMAIN:-sir-labs.com}
      NGINX_CONTAINER: sir-nginx
      PROXY_NETWORK: sir-server_sir-net
      CONF_DIR: /etc/nginx/conf.d
      DASHBOARD_PORT: "8080"
    labels:
      proxy.enable: "true"
      proxy.host: proxy.${DOMAIN:-sir-labs.com}
      proxy.port: "8080"
    networks:
      - sir-net
    restart: unless-stopped
    depends_on:
      sir-nginx:
        condition: service_healthy

networks:
  sir-net:

volumes:
  nginx-conf:
