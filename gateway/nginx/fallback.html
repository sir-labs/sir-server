<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>sir-server</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: monospace;
      background: #111;
      color: #eee;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box { text-align: center; }
    h1 { font-size: 2.5rem; color: #0cf; margin-bottom: .75rem; }
    p  { color: #555; margin-bottom: 2rem; font-size: .95rem; }
    a  { color: #0cf; text-decoration: none; font-size: .9rem; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="box">
    <h1>sir-server</h1>
    <p>no route found for this host</p>
    <a href="/routes" target="_blank">→ view active routes</a>
  </div>
</body>
</html>
